name: Sync NFL schedule

on:
  schedule:
    # Hourly. The sync is a cheap, fully idempotent upsert (by external_id),
    # so running it often just means scores/records show up sooner after
    # each game — no downside to the higher frequency.
    - cron: '0 * * * *'
  workflow_dispatch: {}

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm ci

      - run: node scripts/sync-nfl-schedule.mjs
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
