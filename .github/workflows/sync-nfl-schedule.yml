name: Sync NFL schedule

on:
  schedule:
    # Every Tuesday at 09:00 UTC — after Monday Night Football wraps, so
    # the previous week's final scores are in. Also catches the new
    # season's schedule automatically whenever nflverse publishes it.
    - cron: '0 9 * * 2'
  workflow_dispatch: {}

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm ci

      - run: node scripts/sync-nfl-schedule.mjs
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
